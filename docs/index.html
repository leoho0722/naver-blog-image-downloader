<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naver Blog Image Downloader</title>
  <meta name="description" content="Naver Blog 圖片下載工具 — Flutter App + Python AWS Lambda">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Naver Blog Image Downloader">
  <meta property="og:description" content="Naver Blog 圖片下載工具 — Flutter App + Python AWS Lambda">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #5f6368;
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --border: #e0e0e0;
      --card-shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --surface: #2d2d2d;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --primary: #8ab4f8;
        --primary-hover: #aecbfa;
        --border: #3c4043;
        --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
    }

    body {
      font-family: 'Noto Sans TC', 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .hero-icon {
      font-size: 64px;
      color: var(--primary);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    @media (prefers-color-scheme: dark) {
      .card:hover {
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      }
    }

    .card__icon {
      font-size: 48px;
      color: var(--primary);
    }

    .card__title {
      font-size: 1.25rem;
      font-weight: 700;
    }

    .card__desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .card--disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--border);
      color: var(--text-secondary);
    }

    .footer {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: auto;
      padding-top: 24px;
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .tagline { font-size: 1rem; margin-bottom: 32px; }
      .cards { grid-template-columns: 1fr; }
      .hero-icon { font-size: 48px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <span class="material-symbols-outlined hero-icon">photo_library</span>
    <h1>Naver Blog Image Downloader</h1>
    <p class="tagline">
      Naver Blog 圖片下載工具<br>
      輸入網址，自動擷取並批次下載文章中的所有照片
    </p>

    <div class="cards">
      <a href="mobile/index.html" class="card">
        <span class="material-symbols-outlined card__icon">phone_iphone</span>
        <div class="card__title">App 版</div>
        <div class="card__desc">iOS &amp; Android 行動應用程式，支援批次下載與相簿儲存</div>
      </a>

      <div class="card card--disabled">
        <span class="material-symbols-outlined card__icon">language</span>
        <div class="card__title">Web 版</div>
        <div class="card__desc">瀏覽器線上版，免安裝即可使用</div>
        <span class="badge">即將推出</span>
      </div>
    </div>

    <div class="footer">
      <a href="https://github.com/leoho0722/naver-blog-image-downloader" target="_blank" rel="noopener noreferrer">GitHub</a>
      &nbsp;·&nbsp; © 2026 Naver Blog Image Downloader
    </div>
  </div>

</body>
</html>
