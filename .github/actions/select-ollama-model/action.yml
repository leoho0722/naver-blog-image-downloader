name: Select Random Ollama Model
description: 從 .github/ollama-models.json 隨機選擇一個 Ollama Cloud 模型

outputs:
  model:
    description: 選中的模型名稱
    value: ${{ steps.select.outputs.model }}

runs:
  using: composite
  steps:
    - name: Select random model
      id: select
      shell: bash
      run: |
        CONFIG="$GITHUB_WORKSPACE/.github/ollama-models.json"
        if [[ ! -f "$CONFIG" ]]; then
          echo "::error::ollama-models.json 不存在: $CONFIG"
          exit 1
        fi

        SELECTED=$(jq -r '.models[]' "$CONFIG" | shuf -n1)
        if [[ -z "$SELECTED" ]]; then
          echo "::error::ollama-models.json 的 models 陣列為空"
          exit 1
        fi

        echo "model=$SELECTED" >> "$GITHUB_OUTPUT"
        echo "🎲 選中模型: $SELECTED"
