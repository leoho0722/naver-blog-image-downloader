name: Generate Release Notes
description: 隨機選擇 Ollama Cloud 模型，生成正體中文 Release Notes 並標記模型名稱

inputs:
  tag:
    description: 版本 tag（如 backend-v1.5.0）
    required: true
  commits_file:
    description: commit 記錄檔案路徑
    required: true
  output_file:
    description: Release Notes 輸出檔案路徑
    required: true
  ollama_api_key:
    description: Ollama Cloud API Key
    required: true

outputs:
  model:
    description: 使用的模型名稱
    value: ${{ steps.select_model.outputs.model }}

runs:
  using: composite
  steps:
    - name: Select random model
      id: select_model
      uses: ./.github/actions/select-ollama-model

    - name: Generate release notes
      shell: bash
      env:
        OLLAMA_API_KEY: ${{ inputs.ollama_api_key }}
        OLLAMA_MODEL: ${{ steps.select_model.outputs.model }}
        TAG: ${{ inputs.tag }}
        COMMITS_FILE: ${{ inputs.commits_file }}
        OUTPUT_FILE: ${{ inputs.output_file }}
      run: |
        cat > /tmp/ollama_template.txt <<'TEMPLATE_EOF'
        你是一位專業的軟體發布管理員。請根據以下 Git commit 記錄，撰寫正體中文的 Release Notes。

        要求：
        1. 使用正體中文撰寫
        2. 按類別分組（如有）：✨ 新功能、🐛 錯誤修正、📈 改進與優化、🔄 重構、🔧 維護
        3. 每項用 bullet point 列出
        4. 簡潔專業
        5. 直接輸出 Markdown 內容，不要加前綴或後綴說明
        TEMPLATE_EOF

        jq -n \
          --arg model "$OLLAMA_MODEL" \
          --rawfile template /tmp/ollama_template.txt \
          --arg tag "$TAG" \
          --rawfile commits "$COMMITS_FILE" \
          '{model: $model, messages: [{role: "user", content: ($template + "\n版本號：" + $tag + "\n\nCommit 記錄：\n" + $commits)}], stream: false}' \
          > /tmp/ollama_request.json

        RESPONSE=$(curl -s --max-time 120 -w "\nHTTP_STATUS:%{http_code}" "https://ollama.com/api/chat" \
          -H "Authorization: Bearer $OLLAMA_API_KEY" \
          -H "Content-Type: application/json" \
          --data-binary @/tmp/ollama_request.json)

        HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
        RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

        echo "API HTTP Status: $HTTP_STATUS"

        CONTENT=$(echo "$RESPONSE_BODY" | jq -r '.message.content // empty')

        if [[ -z "$CONTENT" ]] || [[ "$CONTENT" == "null" ]]; then
          echo "⚠️ AI 生成失敗 (HTTP $HTTP_STATUS)，使用 commit 記錄作為 Release Notes"
          echo "API Response: $RESPONSE_BODY"
          {
            echo "## 變更記錄"
            echo ""
            cat "$COMMITS_FILE"
          } > "$OUTPUT_FILE"
        else
          echo "$CONTENT" > "$OUTPUT_FILE"
        fi

        echo "" >> "$OUTPUT_FILE"
        echo "---" >> "$OUTPUT_FILE"
        echo "_Generated by Ollama Cloud (\`$OLLAMA_MODEL\`)_" >> "$OUTPUT_FILE"

        echo "--- Generated Release Notes ---"
        cat "$OUTPUT_FILE"
