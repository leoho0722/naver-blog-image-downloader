name: Mobile CD

on:
  workflow_run:
    workflows: [Mobile CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION_FULL=$(grep -E '^version: ' apps/mobile/pubspec.yaml | head -1 | awk '{print $2}')
          if [ -z "$VERSION_FULL" ]; then
            echo "::error::Failed to read version from apps/mobile/pubspec.yaml"
            exit 1
          fi
          VERSION=${VERSION_FULL%+*}
          TAG="mobile-v${VERSION}"
          git fetch --tags --force
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} already exists — skipping release (bump pubspec version to publish a new one)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Get commits since last mobile tag
        if: steps.version.outputs.skip == 'false'
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --list "mobile-v*" --sort=-version:refname | grep -v "^${TAG}$" | head -n 1 || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" -- apps/mobile)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD" -- apps/mobile)
          fi
          echo "$COMMITS" > /tmp/commits.txt

      - name: Generate release notes
        if: steps.version.outputs.skip == 'false'
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ steps.version.outputs.tag }}
          commits_file: /tmp/commits.txt
          output_file: /tmp/mobile_release_notes.md
          ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}

      - name: Create release
        if: steps.version.outputs.skip == 'false'
        uses: ./.github/actions/create-release
        with:
          tag: ${{ steps.version.outputs.tag }}
          title: "Mobile v${{ steps.version.outputs.version }}"
          notes_file: /tmp/mobile_release_notes.md
