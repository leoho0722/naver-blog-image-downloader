name: Web CD

on:
  workflow_run:
    workflows: [Web CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          if [ -z "$VERSION" ]; then
            echo "::error::無法從 apps/web/package.json 讀取 version 欄位"
            exit 1
          fi
          TAG="web-v${VERSION}"
          git fetch --tags --force
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} 已存在，跳過發版（版號未更新）"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Get commits since last web tag
        if: steps.version.outputs.skip == 'false'
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --list "web-v*" --sort=-version:refname | grep -v "^${TAG}$" | head -n 1 || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" -- apps/web)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD" -- apps/web)
          fi
          echo "$COMMITS" > /tmp/commits.txt

      - name: Generate release notes
        if: steps.version.outputs.skip == 'false'
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ steps.version.outputs.tag }}
          commits_file: /tmp/commits.txt
          output_file: /tmp/release_notes.md
          ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}

      - name: Create release
        if: steps.version.outputs.skip == 'false'
        uses: ./.github/actions/create-release
        with:
          tag: ${{ steps.version.outputs.tag }}
          title: "Web v${{ steps.version.outputs.version }}"
          notes_file: /tmp/release_notes.md
