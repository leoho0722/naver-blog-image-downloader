name: Web CD

on:
  workflow_run:
    workflows: [Web CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          if [ -z "$VERSION" ]; then
            echo "::error::無法從 apps/web/package.json 讀取 version 欄位"
            exit 1
          fi
          TAG="web-v${VERSION}"
          git fetch --tags --force
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} 已存在，跳過發版（版號未更新）"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Get commits since last web tag
        if: steps.version.outputs.skip == 'false'
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --list "web-v*" --sort=-version:refname | grep -v "^${TAG}$" | head -n 1 || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" -- apps/web)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD" -- apps/web)
          fi
          echo "$COMMITS" > /tmp/commits.txt

      - name: Select random Ollama model
        if: steps.version.outputs.skip == 'false'
        id: ollama_model
        run: |
          MODELS=("gemma4:31b-cloud" "qwen3-coder-next" "glm-5.1:cloud" "minimax-m2.7:cloud")
          SELECTED="${MODELS[$((RANDOM % ${#MODELS[@]}))]}"
          echo "model=$SELECTED" >> "$GITHUB_OUTPUT"
          echo "🎲 選中模型: $SELECTED"

      - name: Generate release notes with Ollama Cloud
        if: steps.version.outputs.skip == 'false'
        id: release_notes
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          TAG="${{ steps.version.outputs.tag }}"

          cat <<'PROMPT_EOF' > /tmp/instructions.txt
          你是一位專業的軟體發布管理員。請根據以下 Git commit 記錄，撰寫正體中文的 Release Notes。

          版本號：__TAG__

          Commit 記錄：
          __COMMITS__

          要求：
          1. 使用正體中文撰寫
          2. 按類別分組（如有）：✨ 新功能、🐛 錯誤修正、📈 改進與優化、🔄 重構、🔧 維護
          3. 每項用 bullet point 列出
          4. 簡潔專業
          5. 直接輸出 Markdown 內容，不要加前綴或後綴說明
          PROMPT_EOF

          sed -i "s|__TAG__|$TAG|g" /tmp/instructions.txt
          sed -i "s|__COMMITS__|$COMMITS|g" /tmp/instructions.txt

          jq -n \
            --arg model "${{ steps.ollama_model.outputs.model }}" \
            --rawfile instructions /tmp/instructions.txt \
            '{model: $model, messages: [{role: "user", content: $instructions}], stream: false}' \
            > /tmp/ollama_request.json

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "https://ollama.com/api/chat" \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/ollama_request.json)

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "API HTTP Status: $HTTP_STATUS"

          echo "$RESPONSE_BODY" | jq -r '.message.content' > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ] || grep -q "^null$" /tmp/release_notes.md; then
            echo "⚠️ AI 生成失敗 (HTTP $HTTP_STATUS)，使用 commit 記錄作為 Release Notes"
            echo "API Response: $RESPONSE_BODY"
            {
              echo "## 變更記錄"
              echo ""
              cat /tmp/commits.txt
            } > /tmp/release_notes.md
          fi

          echo "" >> /tmp/release_notes.md
          echo "---" >> /tmp/release_notes.md
          echo "_Generated by Ollama Cloud (\`${{ steps.ollama_model.outputs.model }}\`)_" >> /tmp/release_notes.md

          echo "--- Generated Release Notes ---"
          cat /tmp/release_notes.md

      - name: Create git tag
        if: steps.version.outputs.skip == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "Web v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
