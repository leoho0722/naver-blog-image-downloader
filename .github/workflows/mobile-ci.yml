name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  workflow_dispatch:

jobs:
  flutter-validate:
    name: Flutter — Test, Analyze & Format
    # golden 測試依賴 PingFang / Apple SD Gothic Neo 等 macOS 系統字型，
    # 用 Linux runner 會整批 pixel diff 失敗，因此固定 macOS runner。
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code Generation (Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Test
        run: flutter test

      - name: Analyze
        run: flutter analyze

      - name: Format
        id: format
        run: |
          dart format .
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-commit formatting changes (PR only)
        if: github.event_name == 'pull_request' && steps.format.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: 自動格式化 (dart format)"
          file_pattern: "apps/mobile/**/*.dart"

      - name: Fail if unformatted on main
        if: github.event_name == 'push' && steps.format.outputs.changed == 'true'
        run: |
          echo "::error::main 上有未格式化的 Dart 程式碼；PR CI 應該已 auto-commit 修正，代表流程被繞過"
          exit 1

  ios-native-test:
    name: iOS — Native Unit Tests
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Fix Xcodeproj objectVersion 70 support
        run: gem install specific_install && gem specific_install https://github.com/CocoaPods/Xcodeproj.git

      - name: Pod install
        run: cd ios && pod install

      - name: Cache Pods build
        uses: actions/cache@v5
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}

      - name: Code Generation (Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run iOS native tests
        run: |
          cd ios
          set -o pipefail
          xcodebuild test \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -only-testing RunnerTests \
            | xcpretty

  android-native-test:
    name: Android — Native Unit Tests (JVM)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code Generation (Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Gradle wrapper
        run: flutter build apk --config-only

      - name: Run Android native tests
        run: cd android && ./gradlew :app:testDebugUnitTest
