name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: apps/web
        env:
          VITE_BASE_PATH: /naver-blog-image-downloader/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_STAGE: ${{ secrets.VITE_API_STAGE }}
        run: pnpm build

      - name: Assemble Pages artifact
        run: |
          rm -rf pages-artifact
          mkdir -p pages-artifact
          cp -r apps/web/dist/. pages-artifact/
          # 提供 SPA fallback：GitHub Pages 對未匹配路徑回 404.html，
          # 這裡把 index.html 複製為 404.html 讓 React Router 接管路由。
          cp pages-artifact/index.html pages-artifact/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
