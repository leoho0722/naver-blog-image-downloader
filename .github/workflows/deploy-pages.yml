name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate image references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check image references in HTML
        run: |
          MISSING=0

          for HTML_FILE in docs/index.html docs/mobile/index.html docs/web/index.html; do
            if [ ! -f "$HTML_FILE" ]; then
              echo "::warning::HTML file not found: $HTML_FILE"
              continue
            fi

            DIR=$(dirname "$HTML_FILE")
            REFS=$(grep -oP '(?<=<img[^>]*src=")[^"]+' "$HTML_FILE" 2>/dev/null || true)

            for ref in $REFS; do
              if echo "$ref" | grep -qP '^https?://'; then
                continue
              fi

              if [ ! -f "$DIR/$ref" ]; then
                echo "::error::Missing image: $DIR/$ref (referenced in $HTML_FILE)"
                MISSING=$((MISSING + 1))
              fi
            done
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::Found $MISSING missing image reference(s)"
            exit 1
          fi

          echo "All image references are valid."

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
