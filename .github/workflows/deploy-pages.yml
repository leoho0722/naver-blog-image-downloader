name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate image references
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check image references in HTML
        run: |
          MISSING=0

          for HTML_FILE in $(find docs -name "*.html"); do
            if [ ! -f "$HTML_FILE" ]; then
              echo "::warning::HTML file not found: $HTML_FILE"
              continue
            fi

            DIR=$(dirname "$HTML_FILE")
            REFS=$(grep -oP '(?<=<img[^>]*src=")[^"]+' "$HTML_FILE" 2>/dev/null || true)

            for ref in $REFS; do
              if echo "$ref" | grep -qP '^https?://'; then
                continue
              fi

              if [ ! -f "$DIR/$ref" ]; then
                echo "::error::Missing image: $DIR/$ref (referenced in $HTML_FILE)"
                MISSING=$((MISSING + 1))
              fi
            done
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::Found $MISSING missing image reference(s)"
            exit 1
          fi

          echo "All image references are valid."

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build web app
        working-directory: apps/web
        env:
          VITE_BASE_PATH: /naver-blog-image-downloader/web/app/
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_STAGE: ${{ secrets.VITE_API_STAGE }}
        run: pnpm build

      - name: Copy web build to docs
        run: |
          rm -rf docs/web/app
          cp -r apps/web/dist docs/web/app
          cp docs/web/app/index.html docs/web/app/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
