name: PR Ollama Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ollama-review:
    name: Ollama Cloud Review
    runs-on: ubuntu-latest
    env:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      OLLAMA_MODEL: gemma4:31b-cloud
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch PR diff and request Ollama review
        run: |
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$REPO")

          INSTRUCTIONS=$(cat <<'INSTRUCTIONS_EOF'
          你是本 monorepo 的資深 code reviewer。請審查下方 PR 的所有變更，涵蓋：
          1. 正確性：邏輯錯誤、邊界條件、race condition、資料一致性
          2. 安全性：OWASP top 10、敏感資料處理、權限邊界
          3. 可維護性：命名、模組邊界、重複程式碼、測試覆蓋
          4. 專案規範：是否違反 root CLAUDE.md 與 apps/<component>/CLAUDE.md 裡的規則（註解正體中文、Conventional Commits、架構分層、版號管理）
          5. 效能：明顯的 N+1、不必要的 allocation、阻塞主執行緒

          輸出格式：
          - 所有內容必須以正體中文撰寫
          - 先給一段 2-3 句總評（blocker / 可接受但建議調整 / 無疑慮）
          - 條列具體問題，每項標示嚴重程度（🔴 阻擋合併 / 🟡 建議修正 / 🟢 可選優化）
          - 涉及特定檔案/行數的問題用 file:line 格式標記
          - 最後一句最終結論

          PR Diff：
          INSTRUCTIONS_EOF
          )

          BODY=$(jq -n \
            --arg model "$OLLAMA_MODEL" \
            --arg instructions "$INSTRUCTIONS" \
            --arg diff "$DIFF" \
            '{model: $model, messages: [{role: "user", content: ($instructions + "\n" + $diff)}], stream: false}')

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "https://ollama.com/api/chat" \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -d "$BODY")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Ollama HTTP Status: $HTTP_STATUS"

          REVIEW=$(echo "$RESPONSE_BODY" | jq -r '.message.content // empty')

          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            REVIEW="❌ Ollama review 失敗（HTTP $HTTP_STATUS），請檢查 OLLAMA_API_KEY 與 model 名稱 $OLLAMA_MODEL 是否正確。"
            echo "API Response: $RESPONSE_BODY"
          fi

          printf '### 🤖 Ollama Cloud Review (%s)\n\n%s\n' "$OLLAMA_MODEL" "$REVIEW" > /tmp/ollama_review.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/ollama_review.md
