name: PR Ollama Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ollama-review:
    name: Ollama Cloud Review
    runs-on: ubuntu-latest
    env:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select random Ollama model
        id: ollama_model
        uses: ./.github/actions/select-ollama-model

      - name: Set model env
        run: echo "OLLAMA_MODEL=${{ steps.ollama_model.outputs.model }}" >> "$GITHUB_ENV"

      - name: Fetch PR diff and request Ollama review
        run: |
          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/pr_diff.txt

          cat <<'INSTRUCTIONS_EOF' > /tmp/instructions.txt
          你是本 monorepo 的資深 code reviewer。請審查下方 PR 的所有變更，涵蓋：
          1. 正確性：邏輯錯誤、邊界條件、race condition、資料一致性
          2. 安全性：OWASP top 10、敏感資料處理、權限邊界
          3. 可維護性：命名、模組邊界、重複程式碼、測試覆蓋
          4. 專案規範：是否違反 root CLAUDE.md 與 apps/<component>/CLAUDE.md 裡的規則（註解正體中文、Conventional Commits、架構分層、版號管理）
          5. 效能：明顯的 N+1、不必要的 allocation、阻塞主執行緒

          輸出格式：
          - 所有內容必須以正體中文撰寫
          - 先給一段 2-3 句總評（blocker / 可接受但建議調整 / 無疑慮）
          - 條列具體問題，每項標示嚴重程度（🔴 阻擋合併 / 🟡 建議修正 / 🟢 可選優化）
          - 涉及特定檔案/行數的問題用 file:line 格式標記
          - 最後一句最終結論

          PR Diff：
          INSTRUCTIONS_EOF

          jq -n \
            --arg model "$OLLAMA_MODEL" \
            --rawfile instructions /tmp/instructions.txt \
            --rawfile diff /tmp/pr_diff.txt \
            '{model: $model, messages: [{role: "user", content: ($instructions + "\n" + $diff)}], stream: false}' \
            > /tmp/ollama_request.json

          RESPONSE=""
          if RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "https://ollama.com/api/chat" \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/ollama_request.json); then
            CURL_EXIT_CODE=0
          else
            CURL_EXIT_CODE=$?
          fi

          HTTP_STATUS=$(printf '%s\n' "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          RESPONSE_BODY=$(printf '%s\n' "$RESPONSE" | sed '$d')
          echo "Ollama curl exit code: $CURL_EXIT_CODE"
          echo "Ollama HTTP Status: $HTTP_STATUS"

          review_failed=false
          response_parse_failed=false
          REVIEW=""
          if ! REVIEW=$(printf '%s' "$RESPONSE_BODY" | jq -r '.message.content // empty' 2>/dev/null); then
            response_parse_failed=true
            review_failed=true
          fi

          # curl transport failure 與 HTTP 非 2xx 都視為失敗，避免 workflow 誤報綠燈。
          if [ "$CURL_EXIT_CODE" -ne 0 ]; then
            review_failed=true
          fi
          # HTTP 非 2xx 或回應缺 review content 都視為失敗，避免 workflow 誤報綠燈。
          # 先檢查 HTTP_STATUS 是否為純數字，防止 curl 完全失敗時 shell 噴出數值比較警告。
          if ! [[ "$HTTP_STATUS" =~ ^[0-9]+$ ]]; then
            review_failed=true
          elif [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            review_failed=true
          fi
          if [ "$response_parse_failed" = true ]; then
            echo "API Response is not valid JSON."
          fi
          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            if [ "$CURL_EXIT_CODE" -ne 0 ]; then
              REVIEW="❌ Ollama review 失敗（curl exit $CURL_EXIT_CODE，HTTP $HTTP_STATUS），請檢查網路連線、OLLAMA_API_KEY 與 model 名稱 $OLLAMA_MODEL 是否正確。"
            elif [ "$response_parse_failed" = true ]; then
              REVIEW="❌ Ollama review 失敗（HTTP $HTTP_STATUS，回應不是合法 JSON），請檢查 Ollama API 回傳內容與 model 名稱 $OLLAMA_MODEL 是否正確。"
            else
              REVIEW="❌ Ollama review 失敗（HTTP $HTTP_STATUS），請檢查 OLLAMA_API_KEY 與 model 名稱 $OLLAMA_MODEL 是否正確。"
            fi
            echo "API Response: $RESPONSE_BODY"
            review_failed=true
          fi

          printf '### 🤖 Ollama Cloud Review (%s)\n\n%s\n' "$OLLAMA_MODEL" "$REVIEW" > /tmp/ollama_review.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/ollama_review.md

          if [ "$review_failed" = true ]; then
            echo "::error::Ollama review 呼叫失敗（curl exit $CURL_EXIT_CODE，HTTP $HTTP_STATUS，model $OLLAMA_MODEL），workflow 判定為 failed"
            exit 1
          fi
