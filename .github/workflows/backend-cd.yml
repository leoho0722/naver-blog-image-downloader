name: Backend CD

on:
  workflow_run:
    workflows: [Backend CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write

env:
  IMAGE_NAME: naver-blog-image-downloader-lambda
  IMAGE_ARCH: linux/amd64
  DOCKERFILE_PATH: apps/backend/Dockerfile
  BUILD_CONTEXT: apps/backend

jobs:
  deploy:
    name: Build & Deploy to AWS Lambda
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: image_tag
        run: |
          # дљњзФ® Python tomllib иІ£жЮР pyproject.tomlпЉИubuntu-latest еЕІеїЇ Python 3.11+пЉЙ
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('apps/backend/pyproject.toml','rb'))['project']['version'])")
          if [ -z "$VERSION" ]; then
            echo "::error::зД°ж≥ХеЊЮ apps/backend/pyproject.toml иЃАеПЦ version жђДдљН"
            exit 1
          fi
          TAG="backend-v${VERSION}"
          # еРМж≠• remote tagпЉМзҐЇдњЭиГљеБµжЄђеИ∞еЈ≤е≠ШеЬ®зЪД tag
          git fetch --tags --force
          if git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "::error::Tag ${TAG} еЈ≤е≠ШеЬ®пЉЫиЂЛеЕИ bump apps/backend/pyproject.toml зЪД version еЊМеЖНйГ®зљ≤"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            --platform ${{ env.IMAGE_ARCH }} \
            -t ${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.version }} \
            -f ${{ env.DOCKERFILE_PATH }} \
            ${{ env.BUILD_CONTEXT }}

      - name: Tag and push image to ECR
        run: |
          IMAGE_URI=${{ secrets.AWS_ECR_REPOSITORY_URI }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.version }}
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.version }} ${IMAGE_URI}
          docker push ${IMAGE_URI}

      - name: Update Lambda function code
        run: |
          IMAGE_URI=${{ secrets.AWS_ECR_REPOSITORY_URI }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.version }}
          aws lambda update-function-code \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --image-uri ${IMAGE_URI} \
            --no-cli-pager \
            --output json

      - name: Wait for Lambda function update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --no-cli-pager

      - name: Update Lambda function configuration
        run: |
          # еПЦеЊЧзПЊжЬЙзТ∞еҐГиЃКжХЄдЄ¶еРИдљµ S3_BUCKET_NAME
          EXISTING_ENV=$(aws lambda get-function-configuration \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --query 'Environment.Variables' \
            --output json \
            --no-cli-pager 2>/dev/null || echo '{}')

          NEW_ENV=$(echo "$EXISTING_ENV" | python3 -c "
          import sys, json
          env = json.load(sys.stdin) or {}
          env['S3_BUCKET_NAME'] = '${{ secrets.S3_BUCKET_NAME }}'
          print(json.dumps({'Variables': env}))
          ")

          aws lambda update-function-configuration \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --memory-size 2048 \
            --timeout 120 \
            --environment "$NEW_ENV" \
            --no-cli-pager \
            --output json

      - name: Wait for Lambda configuration update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --no-cli-pager

      - name: Update IAM policy
        run: |
          # еПЦеЊЧ Lambda еЯЈи°МиІТиЙ≤иИЗеЗљжХЄ ARN
          ROLE_ARN=$(aws lambda get-function \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.Role' \
            --output text \
            --no-cli-pager)
          ROLE_NAME=$(echo "$ROLE_ARN" | sed 's|.*/||')

          FUNCTION_ARN=$(aws lambda get-function \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.FunctionArn' \
            --output text \
            --no-cli-pager)

          POLICY_NAME="naver-blog-downloader-async-policy"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text --no-cli-pager)
          POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_NAME}"

          # еїЇзЂЛжЦ∞зЙИжЬђзЪД policyпЉИи¶ЖиУЛзПЊжЬЙзЙИжЬђпЉЙ
          POLICY_DOC=$(cat <<EOF
          {
              "Version": "2012-10-17",
              "Statement": [
                  {
                      "Sid": "S3JobStorage",
                      "Effect": "Allow",
                      "Action": ["s3:PutObject", "s3:GetObject"],
                      "Resource": "arn:aws:s3:::${{ secrets.S3_BUCKET_NAME }}/jobs/*"
                  },
                  {
                      "Sid": "S3WhatsNewReadWrite",
                      "Effect": "Allow",
                      "Action": ["s3:GetObject", "s3:PutObject"],
                      "Resource": "arn:aws:s3:::${{ secrets.S3_BUCKET_NAME }}/whatsnew/*"
                  },
                  {
                      "Sid": "S3WhatsNewList",
                      "Effect": "Allow",
                      "Action": "s3:ListBucket",
                      "Resource": "arn:aws:s3:::${{ secrets.S3_BUCKET_NAME }}",
                      "Condition": {
                          "StringLike": {
                              "s3:prefix": "whatsnew/*"
                          }
                      }
                  },
                  {
                      "Sid": "LambdaSelfInvoke",
                      "Effect": "Allow",
                      "Action": "lambda:InvokeFunction",
                      "Resource": "${FUNCTION_ARN}"
                  }
              ]
          }
          EOF
          )

          # еШЧи©¶еїЇзЂЛ policyпЉМиЛ•еЈ≤е≠ШеЬ®еЙЗжЫіжЦ∞
          if ! aws iam create-policy \
            --policy-name "$POLICY_NAME" \
            --policy-document "$POLICY_DOC" \
            --no-cli-pager 2>/dev/null; then

            # еИ™йЩ§жЬАиИКзЪДйЭЮй†Ри®≠зЙИжЬђпЉМйБњеЕНиґЕйБО 5 зЙИдЄКйЩР
            OLDEST_VERSION=$(aws iam list-policy-versions \
              --policy-arn "$POLICY_ARN" \
              --query 'Versions[?IsDefaultVersion==`false`] | [-1].VersionId' \
              --output text \
              --no-cli-pager)
            if [ -n "$OLDEST_VERSION" ] && [ "$OLDEST_VERSION" != "None" ]; then
              aws iam delete-policy-version \
                --policy-arn "$POLICY_ARN" \
                --version-id "$OLDEST_VERSION" \
                --no-cli-pager
              echo "еЈ≤еИ™йЩ§иИКзЙИжЬђ ${OLDEST_VERSION}"
            fi

            aws iam create-policy-version \
              --policy-arn "$POLICY_ARN" \
              --policy-document "$POLICY_DOC" \
              --set-as-default \
              --no-cli-pager
          fi

          # зҐЇдњЭ policy еЈ≤йЩДеК†еИ∞иІТиЙ≤
          aws iam attach-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-arn "$POLICY_ARN" \
            --no-cli-pager

          echo "IAM policy еЈ≤жЫіжЦ∞дЄ¶йЩДеК†еИ∞иІТиЙ≤ ${ROLE_NAME}"

      - name: Verify Lambda function status
        run: |
          aws lambda get-function \
            --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
            --no-cli-pager \
            --output table \
            --query 'Configuration.{FunctionName: FunctionName, PackageType: PackageType, CodeSize: CodeSize, LastModified: LastModified, State: State, LastUpdateStatus: LastUpdateStatus}'

      - name: Create git tag
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Get commits since last backend tag
        id: changelog
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          # еГЕзЬЛ backend-v* еЙНзґіпЉМйБњеЕНжКУеИ∞жЬ™дЊЖ mobile / web зЪД tag
          PREVIOUS_TAG=$(git tag --list "backend-v*" --sort=-version:refname | grep -v "^${TAG}$" | head -n 1 || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" -- apps/backend)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD" -- apps/backend)
          fi
          echo "$COMMITS" > /tmp/commits.txt
          cat /tmp/commits.txt

      - name: Generate release notes with Ollama Cloud (qwen3-coder-next)
        id: release_notes
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          TAG="${{ steps.image_tag.outputs.tag }}"

          PROMPT=$(cat <<'PROMPT_EOF'
          дљ†жШѓдЄАдљНе∞Иж•≠зЪДиїЯйЂФзЩЉеЄГзЃ°зРЖеУ°гАВиЂЛж†єжУЪдї•дЄЛ Git commit и®ШйМДпЉМжТ∞еѓЂж≠£йЂФдЄ≠жЦЗзЪД Release NotesгАВ

          зЙИжЬђиЩЯпЉЪ__TAG__

          Commit и®ШйМДпЉЪ
          __COMMITS__

          и¶Бж±ВпЉЪ
          1. дљњзФ®ж≠£йЂФдЄ≠жЦЗжТ∞еѓЂ
          2. жМЙй°ЮеИ•еИЖзµДпЉИе¶ВжЬЙпЉЙпЉЪвЬ® жЦ∞еКЯиГљгАБрЯРЫ йМѓи™§дњЃж≠£гАБрЯУИ жФєйА≤иИЗеД™еМЦгАБрЯФД йЗНжІЛгАБрЯФІ зґ≠и≠Ј
          3. жѓПй†ЕзФ® bullet point еИЧеЗЇ
          4. з∞°жљФе∞Иж•≠
          5. зЫіжО•иЉЄеЗЇ Markdown еЕІеЃєпЉМдЄНи¶БеК†еЙНзґіжИЦеЊМзґіи™™жШО
          PROMPT_EOF
          )
          PROMPT="${PROMPT/__TAG__/$TAG}"
          PROMPT="${PROMPT/__COMMITS__/$COMMITS}"

          BODY=$(jq -n \
            --arg model "qwen3-coder-next:cloud" \
            --arg prompt "$PROMPT" \
            '{model: $model, messages: [{role: "user", content: $prompt}], stream: false}')

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "https://ollama.com/api/chat" \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -d "$BODY")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "API HTTP Status: $HTTP_STATUS"

          echo "$RESPONSE_BODY" | jq -r '.message.content' > /tmp/release_notes.md

          # иЛ• AI зФЯжИРе§±жХЧпЉМдљњзФ® commit и®ШйМДдљЬзВЇ fallback
          if [ ! -s /tmp/release_notes.md ] || grep -q "^null$" /tmp/release_notes.md; then
            echo "вЪ†пЄП AI зФЯжИРе§±жХЧ (HTTP $HTTP_STATUS)пЉМдљњзФ® commit и®ШйМДдљЬзВЇ Release Notes"
            echo "API Response: $RESPONSE_BODY"
            {
              echo "## иЃКжЫіи®ШйМД"
              echo ""
              cat /tmp/commits.txt
            } > /tmp/release_notes.md
          fi

          echo "--- Generated Release Notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.image_tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "Backend v${{ steps.image_tag.outputs.version }}" \
            --notes-file /tmp/release_notes.md
